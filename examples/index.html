<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <!-- 批E：移除 maximum-scale/user-scalable（WCAG 1.4.4 低视力用户需可原生放大；300ms 延迟由 touch-action 解决）；
         interactive-widget=resizes-content：虚拟键盘弹出时收缩布局视口（visualViewport 适配的第一道） -->
    <meta name="viewport" content="width=device-width, initial-scale=1, interactive-widget=resizes-content" />
    <title>GPU 富文本引擎 · 示例</title>
    <!-- 库化：示例只留 #app 容器 + 入口脚本；编辑器外壳 DOM 由库 createEditor 在 #app 内程序化构建。 -->
  </head>
  <body style="margin:0">
    <div id="app" style="position:fixed;inset:0"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
