<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <!-- 批E：移除 maximum-scale/user-scalable（WCAG 1.4.4 低视力用户需可原生放大；300ms 延迟由 touch-action 解决）；
         interactive-widget=resizes-content：虚拟键盘弹出时收缩布局视口（visualViewport 适配的第一道） -->
    <meta name="viewport" content="width=device-width, initial-scale=1, interactive-widget=resizes-content" />
    <title>GPU 富文本引擎 · 原型</title>
    <!-- CSP：外壳样式已外置到 src/styles/shell.css（main.ts 入口 import，构建后随 bundle 产出外链 css），
         本文件不含内联 <style>/<script>，宿主可启用不带 style-src 'unsafe-inline' 的严格 CSP。 -->
  </head>
  <body>
    <div id="app">
      <div id="toolbar"></div>
      <div id="body">
        <div id="left-panel">
          <div class="panel-head"><span>大纲</span><button class="panel-collapse" id="left-collapse" title="折叠大纲" aria-label="折叠大纲">‹</button></div>
          <div class="panel-body" id="left-body"></div>
        </div>
        <div id="editor"><canvas id="c"></canvas></div>
      </div>
      <div id="status-bar"></div>
    </div>
    <textarea id="ime" autocapitalize="off" autocomplete="off" autocorrect="off" spellcheck="false"></textarea>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
