<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>GPU 富文本引擎 · 原型</title>
    <style>
      /* 亮色主题令牌（DOM 外壳单一来源；canvas 渲染色见 model/palette.ts）。改这一处即可换肤。 */
      :root {
        --rte-canvas: #ffffff;
        --rte-chrome-bg: #fbfbfc;
        --rte-chrome-fg: #3c4150;
        --rte-chrome-border: #e8e9ec;
        --rte-chrome-hover: #f0f1f3;
        --rte-active-bg: #eef2ff;
        --rte-active-fg: #2563eb;
        --rte-accent: #2563eb;
        --rte-overlay-bg: #ffffff;
        --rte-overlay-border: #e3e5e9;
        --rte-code-bg: #f4f5f7;
        --rte-code-text: #2d3138;
        --rte-text: #1f2430;
        --rte-muted: #6b7280;
        --rte-scrim: rgba(31, 35, 41, 0.45);
        --rte-shadow: 0 8px 24px rgba(15, 17, 23, 0.10);
      }
      html, body { margin: 0; height: 100%; overflow: hidden; background: var(--rte-canvas); }
      #app { position: fixed; inset: 0; display: flex; flex-direction: column; }
      #toolbar { flex: 0 0 auto; }
      #editor { flex: 1 1 auto; position: relative; min-height: 0; background: var(--rte-canvas); }
      canvas { display: block; width: 100%; height: 100%; outline: none; cursor: text; }
      /* 隐藏输入代理：承接键盘 + 输入法(IME) */
      #ime {
        position: fixed; top: 0; left: 0; width: 1px; height: 1px;
        opacity: 0; border: 0; padding: 0; margin: 0; resize: none;
        overflow: hidden; white-space: pre; z-index: -1; color: transparent;
        background: transparent;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="toolbar"></div>
      <div id="editor"><canvas id="c"></canvas></div>
    </div>
    <textarea id="ime" autocapitalize="off" autocomplete="off" autocorrect="off" spellcheck="false"></textarea>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
