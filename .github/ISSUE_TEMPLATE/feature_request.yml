name: ✨ 功能建议
description: 提出一个新功能或改进
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题 / 场景
      description: 这个功能解决了什么痛点？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 期望的方案
      description: 你希望它如何工作？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 还考虑过哪些其他做法？
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: 补充信息
    validations:
      required: false
