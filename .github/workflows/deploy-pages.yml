name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 允许 GITHUB_TOKEN 部署 Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 同时只跑一个部署；不取消进行中的发布，避免半成品上线
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # 子路径部署（go-xworks.github.io/canvas-rich/）：base 同步给资源与字体（BASE_URL）
      - run: npx vite build --base=/canvas-rich/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist-demo

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
